spring.application.name=user-service
server.port=${PORT:8081}

eureka.client.service-url.defaultZone=http://${EUREKA_SERVER_HOST:localhost}:${EUREKA_SERVER_PORT:8761}/eureka
eureka.instance.hostname=${RENDER_DISCOVERY_SERVICE:${HOSTNAME:localhost}}
eureka.instance.prefer-ip-address=false
eureka.instance.non-secure-port=${PORT:8081}

spring.datasource.url=${USER_DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${USER_DB_USERNAME}
spring.datasource.password=${USER_DB_PASSWORD}

spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.keepalive-time=10000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.error.include-message=always

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
