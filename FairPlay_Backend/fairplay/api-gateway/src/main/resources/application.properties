spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**,/activities/**

spring.cloud.gateway.routes[1].id=venue-service
spring.cloud.gateway.routes[1].uri=lb://venue-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/venues/**,/bookings/**,/owners/**
